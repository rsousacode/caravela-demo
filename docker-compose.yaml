services:
  postgres:
    image: postgres:16-alpine
    container_name: caravela_demo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: caravela_demo_dev
    ports:
      - "5432:5432"
    volumes:
      - caravela_demo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  caravela_demo_pgdata:
